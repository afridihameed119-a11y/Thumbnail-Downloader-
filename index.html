<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAMEED ULLAH THUMBNAIL DOWNLOADER</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.85)),
    url("https://i.ibb.co/KcTh6Xmc/49272.jpg") center/cover no-repeat fixed;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    max-width:850px;
    width:100%;
    background:rgba(0,0,0,.6);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:40px;
    box-shadow:0 0 40px rgba(0,0,0,.9);
    color:#fff;
    text-align:center;
}

.logo{
    font-family:'Anton', sans-serif;
    font-size:3em;
    color:#ff0000;
    letter-spacing:3px;
    margin-bottom:10px;
}

.subtitle{
    color:#ccc;
    margin-bottom:30px;
}

.search-input{
    width:100%;
    padding:15px;
    border-radius:50px;
    border:2px solid #222;
    background:#000;
    color:#fff;
    margin-bottom:20px;
}

.search-input:focus{
    border-color:#ff0000;
}

.download-btn{
    width:100%;
    padding:15px;
    border-radius:50px;
    background:linear-gradient(45deg,#ff0000,#990000);
    border:none;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

.thumbnail-container{
    margin-top:30px;
}

.thumbnails-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.thumbnail-item{
    background:#000;
    padding:15px;
    border-radius:10px;
}

.thumbnail-image{
    width:100%;
    border-radius:8px;
}

.download-thumb-btn{
    margin-top:10px;
    width:100%;
    padding:10px;
    background:#ff0000;
    border:none;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
}

/* NEW FOOTER */
.footer{
    margin-top:30px;
    font-size:14px;
    color:#aaa;
    letter-spacing:2px;
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">HAMEED ULLAH</div>
  <div class="subtitle">THUMBNAIL DOWNLOADER</div>

  <input id="youtubeUrl" class="search-input" placeholder="Paste YouTube link">

  <button class="download-btn" onclick="getThumbnails()">GET THUMBNAILS</button>

  <div id="results"></div>

  <!-- FOOTER TEXT -->
  <div class="footer">Developer By>HAMEED ULLAH</div>

</div>

<script>
function getThumbnails(){
  const url=document.getElementById("youtubeUrl").value;
  const id=url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
  if(!id) return alert("Invalid YouTube URL");
  const vid=id[1];

  const qualities=[
    ["MAX","maxresdefault"],
    ["HD","sddefault"],
    ["HQ","hqdefault"],
    ["MQ","mqdefault"],
    ["DEFAULT","default"]
  ];

  let html='<div class="thumbnail-container"><div class="thumbnails-grid">';
  qualities.forEach(q=>{
    html+=`
    <div class="thumbnail-item">
      <b>${q[0]}</b>
      <img class="thumbnail-image" src="https://i.ytimg.com/vi/${vid}/${q[1]}.jpg">
      <button class="download-thumb-btn" onclick="directDownload('https://i.ytimg.com/vi/${vid}/${q[1]}.jpg')">Download</button>
    </div>`;
  });
  html+='</div></div>';
  document.getElementById("results").innerHTML=html;
}

async function directDownload(url){
    try {
        const response = await fetch(url);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = blobUrl;
        a.download = "thumbnail.jpg";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
    } catch (err) {
        alert("Download failed. Open image manually.");
    }
}
</script>

</body>
</html>
